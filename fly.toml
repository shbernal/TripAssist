# TripAssist — Fly.io deployment.
# One machine runs Express + the SSE hub + Vapi webhooks and serves web/dist.
# `fly launch` may rename `app` to something globally unique; keep the rest.

app = "tripassist-demo"
primary_region = "cdg"        # Paris — matches the French persona and demo

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  # Diskless demo store: the app auto-seeds the demo trip on boot, so no volume
  # is needed. Switch to a mounted volume + a real path if you want persistence.
  TRIPASSIST_DB = ":memory:"

[http_service]
  internal_port = 3000
  force_https = true
  # Keep one machine warm so there is no cold start mid-demo. SSE streams are
  # long-lived, so auto-stop is a poor fit here.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
