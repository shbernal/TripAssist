# All tools are invoked via `node node_modules/...` because the repo path can
# contain a ':' that corrupts PATH and breaks node_modules/.bin shims — the same
# constraint the package.json scripts follow. This applies inside git hooks too.
# (`pnpm` itself is the corepack-managed package manager, not a .bin shim, so it
# is safe to call directly.)
pre-commit:
  parallel: false
  jobs:
    - name: format
      glob: '*.{ts,tsx,js,jsx,json,css,md,html,yml,yaml}'
      # CLAUDE.md is a symlink to AGENTS.md; Prettier errors on symlinks passed
      # explicitly. Exclude it — its target is formatted on its own.
      exclude: 'CLAUDE.md'
      run: node node_modules/prettier/bin/prettier.cjs --write {staged_files}
      stage_fixed: true
    # apps/* are isolated workspace members with their own flat ESLint config +
    # node_modules/eslint. `root:` scopes each job to staged files under that app
    # and runs from there, so the app's own config applies.
    - name: lint-demo
      root: 'apps/demo/'
      glob: '*.{ts,tsx,js,jsx}'
      run: node node_modules/eslint/bin/eslint.js --fix {staged_files}
      stage_fixed: true
    - name: lint-dashboard
      root: 'apps/dashboard/'
      glob: '*.{ts,tsx,js,jsx}'
      run: node node_modules/eslint/bin/eslint.js --fix {staged_files}
      stage_fixed: true

# No server/tests live on this branch anymore — the pre-push gate is the apps'
# own typecheck + lint, fanned out across every workspace member.
pre-push:
  parallel: false
  jobs:
    - name: typecheck
      run: pnpm -r typecheck
    - name: lint
      run: pnpm -r lint
