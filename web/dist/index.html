<html lang="fr">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TripAssist - orchestration de voyage accessible</title>
    <!-- Apply the saved / preferred theme before paint to avoid a flash of the wrong theme. -->
    <script>
      ;(function () {
        try {
          var t = localStorage.getItem('tripassist-theme')
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
          }
          document.documentElement.dataset.theme = t
        } catch (e) {}
      })()
    </script>
