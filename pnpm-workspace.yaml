# The MVP is the single root package (server/ + web/ + shared/). No workspace
# members: this file is kept only for pnpm 11's build-script allowlist below.
packages: []

# pnpm 11 reads the build-script allowlist here (no longer from package.json's "pnpm" field).
# esbuild's install step fetches the platform binary that Vite/Vitest rely on.
allowBuilds:
  esbuild: true
  # lefthook ships its binary via the platform optional-dependency
  # (lefthook-linux-x64), so its own postinstall download is redundant.
  lefthook: false
  # @vapi-ai/mcp-docs-server (Vapi docs MCP) pulls these in; sharp needs its
  # native binary or the server crashes on start, protobufjs builds its runtime.
  protobufjs: true
  sharp: true
