# NOT a monorepo — this repo is a single app (no `packages:` members). pnpm 11
# reads its install settings from this file (the `pnpm` field in package.json is
# no longer honored), so it survives purely to hold the build-script allowlist:
# esbuild's install step fetches the platform binary Vite relies on; lefthook
# ships its binary via a platform optional-dependency, so skip its postinstall.
allowBuilds:
  esbuild: true
  lefthook: false
