# The MVP stays the root package (server/ + web/ + shared/, unmoved). Only apps/*
# are declared as workspace members so apps/demo gets its own isolated dependency
# closure (gsap, lenis, framer-motion, howler, wavesurfer) without touching the MVP.
packages:
  - apps/*

# pnpm 11 reads the build-script allowlist here (no longer from package.json's "pnpm" field).
# esbuild's install step fetches the platform binary that Vite/Vitest rely on.
allowBuilds:
  esbuild: true
  # lefthook ships its binary via the platform optional-dependency
  # (lefthook-linux-x64), so its own postinstall download is redundant.
  lefthook: false
