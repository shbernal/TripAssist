# Deploy the functional MVP (Express + React) to Fly.io on every push to `mvp`.
# The static `concept` showcase is deployed separately to GitHub Pages, so this
# workflow is scoped to the branch that maps to the Fly app.
name: Fly Deploy

on:
  push:
    branches: [mvp]
  workflow_dispatch:

concurrency:
  group: fly-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # VITE_* keys are baked into the client bundle at build time, so they must
      # be passed as Docker build-args (Fly runtime secrets never reach the Vite
      # build). The Vapi public key + assistant id are safe to embed in client JS.
      - run: >
          flyctl deploy --remote-only
          --build-arg VITE_VAPI_PUBLIC_KEY=${{ secrets.VITE_VAPI_PUBLIC_KEY }}
          --build-arg VITE_VAPI_ASSISTANT_ID=${{ secrets.VITE_VAPI_ASSISTANT_ID }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
