# Deploy the functional MVP (Express + React) to Fly.io on every push to `mvp`.
# The static `concept` showcase is deployed separately to GitHub Pages, so this
# workflow is scoped to the branch that maps to the Fly app.
name: Fly Deploy

on:
  push:
    branches: [mvp]
  workflow_dispatch:

concurrency:
  group: fly-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
