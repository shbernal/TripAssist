name: Deploy demo → GitHub Pages

# Builds apps/demo with base=/AccessTrip/ and publishes dist/ to GitHub Pages.
# No external account needed. The MVP (root package) is never built here.
on:
  push:
    branches: [main]
    paths:
      - 'apps/demo/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-demo.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; newest push wins.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Reads packageManager (pnpm@11.5.2) from the root package.json.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @accesstrip/demo build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/demo/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
