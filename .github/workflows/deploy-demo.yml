name: Deploy demo → GitHub Pages

# Builds the single static app (two entry points) and publishes it to GitHub Pages:
#   - the story landing page      at /TripAssist/            (index.html)
#   - the operator dashboard      at /TripAssist/dashboard/  (dashboard/index.html)
# One shared Vite `base` (/TripAssist/); Vite emits both HTML files in place, so the
# `dist` output is published as-is. No external account needed; no backend is built
# here (the functional MVP lives on the `mvp` branch).
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'dashboard/**'
      - 'vite.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-demo.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; newest push wins.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Reads packageManager (pnpm@11.5.2) from the root package.json.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Vite already emits index.html at the root and dashboard/index.html nested,
      # both under base=/TripAssist/ — publish the build output as-is.
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
