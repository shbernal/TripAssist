name: Deploy demo → GitHub Pages

# Builds both static apps and publishes a COMBINED site to GitHub Pages:
#   - the story landing page (apps/story)      at /TripAssist/
#   - the operator dashboard (apps/dashboard) at /TripAssist/dashboard/
# Each app's Vite `base` is set to match its path. No external account needed;
# no backend is built here (the functional MVP lives on the `mvp` branch).
on:
  push:
    branches: [main]
    paths:
      - 'apps/story/**'
      - 'apps/dashboard/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-demo.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; newest push wins.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Reads packageManager (pnpm@11.5.2) from the root package.json.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @tripassist/story build
      - run: pnpm --filter @tripassist/dashboard build
      # Assemble the combined artifact: landing page at the root, dashboard nested
      # under /dashboard (its base=/TripAssist/dashboard/ already points there).
      - name: Assemble combined site
        run: |
          rm -rf _site
          cp -r apps/story/dist _site
          cp -r apps/dashboard/dist _site/dashboard
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
